<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자랑하기</title>
  <link rel="stylesheet" href="./css/write.css" />
  <link rel="stylesheet" href="./css/header.css" />
</head>
<body>
  <!-- 상단 헤더: 뒤로가기 + 제목 + 프로필 -->
  <header class="app-header">
    <button id="back-btn" class="icon-btn back-btn" aria-label="뒤로가기">&lt;</button>
    <h1 class="app-title">사소한 자랑 대회</h1>
    <div class="profile-menu-wrap">
      <button id="profile-btn" class="profile-btn" aria-label="프로필"></button>
      <ul id="profile-dropdown" class="profile-dropdown">
        <li><a href="./profile-edit.html">회원정보수정</a></li>
        <li><a href="./password-edit.html">비밀번호수정</a></li>
        <li><button id="logout-btn" type="button">로그아웃</button></li>
      </ul>
    </div>
  </header>

  <main class="write">
    <!-- 작성/수정 모드에 따라 JS가 글자를 바꿈 (기본: 게시글 작성) -->
    <h2 id="form-title" class="form-title">자랑하기</h2>

    <form id="write-form" class="write-form" novalidate>
      <!-- 제목: 최대 26자 (maxlength로 27자 이상 입력 자체를 막음) -->
      <div class="field">
        <label for="title-input">제목*</label>
        <input
          type="text"
          id="title-input"
          class="title-input"
          maxlength="26"
          placeholder="제목을 입력해주세요 (최대 26자)"
        />
      </div>

      <!-- 내용: 길이 제한 없음 -->
      <div class="field">
        <label for="content-input">내용*</label>
        <textarea
          id="content-input"
          class="content-input"
          placeholder="내용을 입력해주세요"
        ></textarea>
      </div>

      <!-- 검증 메시지 자리 (JS에서 채움) -->
      <p id="helper-text" class="helper-text"></p>

      <!-- 이미지: 1개만. 수정 시 기존 파일명 표시 -->
      <div class="field">
        <label for="image-input">이미지</label>
        <div class="image-row">
          <input type="file" id="image-input" accept="image/*" />
          <span id="image-name" class="image-name">파일을 선택해주세요.</span>
        </div>
      </div>

      <!-- 미리보기 + 작성 버튼: 기본은 비활성, 제목+내용 채워지면 활성 (JS) -->
      <div class="btn-row">
        <button type="button" id="preview-btn" class="preview-btn">미리보기</button>
        <button type="submit" id="submit-btn" class="submit-btn" disabled>완료</button>
      </div>
    </form>
  </main>

  <!-- ===== 미리보기 모달: 제목/내용/이미지를 상세페이지 형태로 보여줌 (값 채우기는 JS) ===== -->
  <div id="preview-modal" class="modal-overlay">
    <div class="preview-modal">
      <div class="preview-modal-header">
        <span class="preview-modal-label">미리보기</span>
        <button type="button" id="preview-close-btn" class="preview-close-btn">닫기</button>
      </div>
      <div class="preview-modal-body">
        <h3 id="preview-title" class="preview-title"></h3>
        <div class="preview-author-row">
          <span id="preview-avatar" class="preview-avatar"></span>
          <span id="preview-author-name" class="preview-author-name"></span>
        </div>
        <hr class="preview-divider" />
        <div id="preview-thumb" class="preview-thumb"></div>
        <p id="preview-content" class="preview-content"></p>
        <div class="preview-stats">
          <div class="preview-stat">
            <p class="preview-stat-num">0</p>
            <p class="preview-stat-label">잘했어요👏</p>
          </div>
          <div class="preview-stat">
            <p class="preview-stat-num">0</p>
            <p class="preview-stat-label">조회수</p>
          </div>
          <div class="preview-stat">
            <p class="preview-stat-num">0</p>
            <p class="preview-stat-label">칭찬</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/header.js"></script>

  <script src="./js/upload.js"></script>
  <script src="./js/post-make.js"></script>
</body>
</html>
