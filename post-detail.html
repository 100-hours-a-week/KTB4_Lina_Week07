<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자랑 상세조회</title>
  <link rel="stylesheet" href="./css/post-detail.css" />
  <link rel="stylesheet" href="./css/header.css" />
</head>
<body>
  <!-- 상단 헤더: 뒤로가기 + 제목 + 프로필 -->
  <header class="app-header">
    <button id="back-btn" class="icon-btn back-btn" aria-label="뒤로가기">&lt;</button>
    <h1 class="app-title">사소한 자랑 대회</h1>
    <div class="profile-menu-wrap">
      <button id="profile-btn" class="profile-btn" aria-label="프로필"></button>
      <ul id="profile-dropdown" class="profile-dropdown">
        <li><a href="./profile-edit.html">회원정보수정</a></li>
        <li><a href="./password-edit.html">비밀번호수정</a></li>
        <li><button id="logout-btn" type="button">로그아웃</button></li>
      </ul>
    </div>
  </header>

  <main class="detail">
    <!-- 게시글 헤더: 제목 / 작성자·날짜 / 수정·삭제 -->
    <section class="post-head">
      <h2 id="post-title" class="post-title">제목 1</h2>

      <div class="post-head-row">
        <div class="post-author">
          <span id="author-avatar" class="author-avatar"></span>
          <span id="author-name" class="author-name">더미 작성자 1</span>
          <span id="post-date" class="post-date">2021-01-01 00:00:00</span>
        </div>

        <div class="post-actions">
          <button id="edit-post-btn" class="small-btn">수정</button>
          <button id="delete-post-btn" class="small-btn">삭제</button>
        </div>
      </div>
    </section>

    <hr class="divider" />

    <!-- 본문 -->
    <div id="post-image" class="post-image"></div>
    <p id="post-content" class="post-content"></p>

    <!-- 좋아요 / 조회수 / 댓글수 -->
    <div class="stats-row">
      <!-- 좋아요는 클릭 가능한 버튼 (토글) -->
      <button id="like-btn" class="stat-box like-box">
        <span id="like-count" class="stat-num">0</span>
        <span class="stat-label">박수 수</span>
      </button>
      <div class="stat-box">
        <span id="view-count" class="stat-num">0</span>
        <span class="stat-label">조회수</span>
      </div>
      <div class="stat-box">
        <span id="comment-count" class="stat-num">0</span>
        <span class="stat-label">칭찬</span>
      </div>
    </div>

    <hr class="divider" />

    <!-- 댓글 입력 -->
    <form id="comment-form" class="comment-form">
      <textarea id="comment-input" class="comment-input" placeholder="칭찬을 남겨주세요!"></textarea>
      <div class="comment-form-footer">
        <!-- 입력 전엔 비활성 (login/write 버튼과 같은 패턴) -->
        <button type="submit" id="comment-submit" class="comment-submit" disabled>칭찬 남기기</button>
      </div>
    </form>

    <!-- 댓글 목록: JS에서 여기 안에 댓글을 추가 -->
    <section id="comment-list" class="comment-list">
    </section>
  </main>

  <!-- ===== 게시글 삭제 확인 모달 ===== -->
  <div id="post-delete-modal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">자랑을 삭제하시겠습니까?</h3>
      <p class="modal-desc">삭제한 내용은 복구 할 수 없습니다.</p>
      <div class="modal-actions">
        <button class="modal-cancel">취소</button>
        <button class="modal-confirm">확인</button>
      </div>
    </div>
  </div>

  <!-- ===== 댓글 삭제 확인 모달 ===== -->
  <div id="comment-delete-modal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">칭찬을 삭제하시겠습니까?</h3>
      <p class="modal-desc">삭제한 내용은 복구 할 수 없습니다.</p>
      <div class="modal-actions">
        <button class="modal-cancel">취소</button>
        <button class="modal-confirm">확인</button>
      </div>
    </div>
  </div>
  <script src="./js/header.js"></script>

 <script src="./js/post-detail.js"></script>
</body>
</html>
