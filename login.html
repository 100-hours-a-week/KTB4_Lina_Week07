<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <!-- 상단 헤더 -->
  <header class="app-header">
    <h1 class="app-title">아무 말 대잔치</h1>
  </header>

  <!-- 로그인 영역 -->
  <main class="login-wrap">
    <h2 class="login-title">로그인</h2>

    <!-- novalidate: 브라우저 기본 검증을 끄고 JS로 직접 검증할 거라서 -->
    <form id="login-form" class="login-form" novalidate>
      <!-- 이메일 -->
      <div class="field">
        <label for="email">이메일</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="이메일을 입력하세요"
          autocomplete="email"
        />
      </div>

      <!-- 비밀번호 -->
      <div class="field">
        <label for="password">비밀번호</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="비밀번호를 입력하세요"
          autocomplete="current-password"
        />
      </div>

      <!-- 검증/로그인 결과 메시지가 표시될 자리 (JS에서 채움) -->
      <p id="helper-text" class="helper-text"></p>

      <!-- 로그인 버튼: 유효성 통과 전에는 disabled (JS에서 풀어줌) -->
      <button type="submit" id="login-btn" class="login-btn" disabled>
        로그인
      </button>
    </form>

    <!-- 회원가입 페이지로 이동 -->
    <a href="./signup.html" class="signup-link">회원가입</a>
  </main>

  <script src="./js/login.js"></script>
</body>
</html>
