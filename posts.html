<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자랑 목록</title>
  <link rel="stylesheet" href="./css/posts.css" />
  <link rel="stylesheet" href="./css/header.css" />
</head>
<body>
  <!-- 상단 헤더: 제목 + 오른쪽 프로필 -->
  <header class="app-header">
    <h1 class="app-title">사소한 자랑 대회</h1>
    <!-- 프로필 아바타 (클릭 시 메뉴 등은 나중에 JS로) -->
    <div class="profile-menu-wrap">
      <button id="profile-btn" class="profile-btn" aria-label="프로필"></button>
      <ul id="profile-dropdown" class="profile-dropdown">
        <li><a href="./profile-edit.html">회원정보수정</a></li>
        <li><a href="./password-edit.html">비밀번호수정</a></li>
        <li><button id="logout-btn" type="button">로그아웃</button></li>
      </ul>
    </div>
  </header>

  <main class="board">
    <!-- 히어로: 한 줄 소개 + 인사 문구 + 키워드 태그 -->
    <section class="board-hero">
      <p class="board-greeting">
        오늘은 무엇을 해냈나요?<br />
        사소한 일도 여기서는 충분히 자랑거리예요.
      </p>
      <div class="hero-tags">
        <span class="hero-tag">작은 성취도 인정</span>
        <span class="hero-tag">비교 없이 칭찬만</span>
        <span class="hero-tag">짧은 글도 OK</span>
      </div>
    </section>

    <!-- 게시글 작성 버튼 (우측 정렬) -->
    <div class="write-row">
      <a href="./post-make.html" class="write-btn">자랑하기</a>
    </div>

    <!-- 게시글 카드가 들어갈 목록. JS에서 여기 안에 카드를 추가(append)하면 됨 -->
    <section id="post-list" class="post-list">

      

    </section>

    <!-- 인피니티 스크롤 감지용 표식. JS에서 이 요소가 화면에 보이면 다음 10개를 더 불러오면 됨 -->
    <div id="scroll-sentinel"></div>
  </main>
  <script src="./js/header.js"></script>

  <script src="./js/posts.js"></script>
</body>
</html>
