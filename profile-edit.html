<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원정보수정</title>
  <link rel="stylesheet" href="./css/profile-edit.css" />
</head>
<body>
  <!-- 상단 헤더: 제목 + 프로필(드롭다운) -->
  <header class="app-header">
    <h1 class="app-title">아무 말 대잔치</h1>

    <!-- 프로필 버튼 클릭 → 드롭다운 메뉴 -->
    <div class="profile-menu-wrap">
      <button id="profile-btn" class="profile-btn" aria-label="프로필"></button>
      <ul id="profile-dropdown" class="profile-dropdown">
        <li><a href="./profile-edit.html">회원정보수정</a></li>
        <li><a href="./password-edit.html">비밀번호수정</a></li>
        <li><button id="logout-btn" type="button">로그아웃</button></li>
      </ul>
    </div>
  </header>

  <main class="edit-profile">
    <h2 class="page-title">회원정보 수정</h2>

    <form id="profile-form" class="profile-form" novalidate>
      <!-- 프로필 사진: 동그라미 + 변경 버튼 -->
      <label class="field-label profile-label">프로필 사진*</label>
      <label class="profile-uploader" for="profile-input">
        <img id="profile-preview" class="profile-preview" alt="프로필" />
        <span class="profile-change">변경</span>
      </label>
      <input type="file" id="profile-input" accept="image/*" hidden />

      <!-- 이메일: 읽기 전용 (수정 불가라 텍스트로 표시) -->
      <div class="field">
        <label class="field-label">이메일</label>
        <p id="email-value" class="email-value">이메일을 불러오는 중...</p>
      </div>

      <!-- 닉네임: 수정 가능 -->
      <div class="field">
        <label for="nickname">닉네임</label>
        <input type="text" id="nickname" placeholder="닉네임을 입력하세요" />
        <p id="nickname-helper" class="helper-text"></p>
      </div>

      <!-- 수정하기 -->
      <button type="submit" id="edit-btn" class="edit-btn">수정하기</button>
    </form>

    <!-- 회원 탈퇴 -->
    <button id="withdraw-btn" type="button" class="withdraw-btn">회원 탈퇴</button>

    <!-- 수정완료 토스트 (회원 탈퇴 바로 아래, 기본 숨김) -->
    <div id="toast" class="toast">수정완료</div>
  </main>

  <!-- ===== 회원 탈퇴 확인 모달 ===== -->
  <div id="withdraw-modal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">회원탈퇴 하시겠습니까?</h3>
      <p class="modal-desc">작성된 게시글과 댓글은 삭제됩니다.</p>
      <div class="modal-actions">
        <button class="modal-cancel">취소</button>
        <button class="modal-confirm">확인</button>
      </div>
    </div>
  </div>

  <script src="./js/header.js"></script>
  <script src="./js/upload.js"></script>
  <script src="./js/profile-edit.js"></script>
</body>
</html>
