<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 수정</title>
  <!-- 레이아웃이 작성 페이지와 같아 write.css를 함께 사용 -->
  <link rel="stylesheet" href="./css/write.css" />
  <link rel="stylesheet" href="./css/header.css" />
</head>
<body>
  <!-- 상단 헤더: 뒤로가기 + 제목 + 프로필 -->
  <header class="app-header">
    <button id="back-btn" class="icon-btn back-btn" aria-label="뒤로가기">&lt;</button>
    <h1 class="app-title">아무 말 대잔치</h1>
    <div class="profile-menu-wrap">
      <button id="profile-btn" class="profile-btn" aria-label="프로필"></button>
      <ul id="profile-dropdown" class="profile-dropdown">
        <li><a href="./profile-edit.html">회원정보수정</a></li>
        <li><a href="./password-edit.html">비밀번호수정</a></li>
        <li><button id="logout-btn" type="button">로그아웃</button></li>
      </ul>
    </div>
  </header>

  <main class="write">
    <h2 class="form-title">게시글 수정</h2>

    <form id="edit-form" class="write-form" novalidate>
      <!-- 제목: 최대 26자 -->
      <div class="field">
        <label for="title-input">제목*</label>
        <input
          type="text"
          id="title-input"
          class="title-input"
          maxlength="26"
          placeholder="제목을 입력해주세요 (최대 26자)"
        />
      </div>

      <!-- 내용: 길이 제한 없음 -->
      <div class="field">
        <label for="content-input">내용*</label>
        <textarea
          id="content-input"
          class="content-input"
          placeholder="내용을 입력해주세요"
        ></textarea>
      </div>

      <!-- 검증 메시지 자리 -->
      <p id="helper-text" class="helper-text"></p>

      <!-- 이미지: 수정 시 기존 파일명 표시 -->
      <div class="field">
        <label for="image-input">이미지</label>
        <div class="image-row">
          <input type="file" id="image-input" accept="image/*" />
          <span id="image-name" class="image-name">기존 파일 명</span>
        </div>
      </div>

      <!-- 수정 버튼: 제목+내용 채워지면 활성 -->
      <button type="submit" id="submit-btn" class="submit-btn" disabled>수정하기</button>
    </form>
  </main>
  <script src="./js/header.js"></script>

  <script src="./js/upload.js"></script>
  <script src="./js/post-edit.js"></script> 
</body>
</html>
