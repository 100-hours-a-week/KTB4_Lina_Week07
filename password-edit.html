<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 수정</title>
  <!-- 레이아웃이 회원정보수정과 비슷해 profile-edit.css + 공통 header.css 사용 -->
  <link rel="stylesheet" href="./css/profile-edit.css" />
  <link rel="stylesheet" href="./css/header.css" />
</head>
<body>
  <!-- 상단 헤더: 제목 + 프로필(드롭다운) -->
  <header class="app-header">
    <button id="back-btn" class="icon-btn back-btn" aria-label="뒤로가기">&lt;</button>
    <h1 class="app-title">아무 말 대잔치</h1>
    <div class="profile-menu-wrap">
      <button id="profile-btn" class="profile-btn" aria-label="프로필"></button>
      <ul id="profile-dropdown" class="profile-dropdown">
        <li><a href="./profile-edit.html">회원정보수정</a></li>
        <li><a href="./password-edit.html">비밀번호수정</a></li>
        <li><button id="logout-btn" type="button">로그아웃</button></li>
      </ul>
    </div>
  </header>

  <main class="edit-profile">
    <h2 class="page-title">비밀번호 수정</h2>

    <form id="password-form" class="profile-form" novalidate>
      <!-- 비밀번호 -->
      <div class="field">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="new-password" />
        <p id="password-helper" class="helper-text"></p>
      </div>

      <!-- 비밀번호 확인 -->
      <div class="field">
        <label for="password-confirm">비밀번호 확인</label>
        <input type="password" id="password-confirm" placeholder="비밀번호를 한번 더 입력하세요" autocomplete="new-password" />
        <p id="password-confirm-helper" class="helper-text"></p>
      </div>

      <!-- 수정하기: 둘 다 유효하면 활성(#7F6AEE) -->
      <button type="submit" id="edit-btn" class="edit-btn" disabled>수정하기</button>
    </form>

    <!-- 수정완료 토스트 (기본 숨김) -->
    <div id="toast" class="toast">수정완료</div>
  </main>

  <script src="./js/header.js"></script>
  <script src="./js/password-edit.js"></script>
</body>
</html>
