<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <link rel="stylesheet" href="./css/signup.css" />
</head>
<body>
  <!-- 상단 헤더: 뒤로가기 + 제목 (로그인 전이라 프로필 없음) -->
  <header class="app-header">
    <button id="back-btn" class="icon-btn back-btn" aria-label="뒤로가기">&lt;</button>
    <h1 class="app-title">아무 말 대잔치</h1>
  </header>

  <main class="signup">
    <h2 class="signup-title">회원가입</h2>

    <form id="signup-form" class="signup-form" novalidate>
      <!-- 프로필 사진: 동그라미 클릭 → 파일 선택. 선택하면 미리보기 표시 -->
      <div class="field">
        <label class="field-label">프로필 사진</label>
        <p id="profile-helper" class="helper-text"></p>

        <!-- label로 file input을 감싸서 동그라미를 누르면 파일 선택창이 뜸 -->
        <label class="profile-uploader" for="profile-input">
          <span class="profile-plus">+</span>
          <img id="profile-preview" class="profile-preview" alt="" />
        </label>
        <input type="file" id="profile-input" accept="image/*" hidden />
      </div>

      <!-- 이메일 -->
      <div class="field">
        <label for="email">이메일*</label>
        <input type="email" id="email" placeholder="이메일을 입력하세요" autocomplete="email" />
        <p id="email-helper" class="helper-text"></p>
      </div>

      <!-- 비밀번호 -->
      <div class="field">
        <label for="password">비밀번호*</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="new-password" />
        <p id="password-helper" class="helper-text"></p>
      </div>

      <!-- 비밀번호 확인 -->
      <div class="field">
        <label for="password-confirm">비밀번호 확인*</label>
        <input type="password" id="password-confirm" placeholder="비밀번호를 한번 더 입력하세요" autocomplete="new-password" />
        <p id="password-confirm-helper" class="helper-text"></p>
      </div>

      <!-- 닉네임 -->
      <div class="field">
        <label for="nickname">닉네임*</label>
        <input type="text" id="nickname" placeholder="닉네임을 입력하세요" />
        <p id="nickname-helper" class="helper-text"></p>
      </div>

      <!-- 회원가입 버튼: 기본 비활성, 전부 유효하면 활성(#7F6AEE) -->
      <button type="submit" id="signup-btn" class="signup-btn" disabled>회원가입</button>
    </form>

    <!-- 로그인 페이지로 이동 -->
    <a href="./login.html" class="login-link">로그인하러 가기</a>
  </main>

  <script src="./js/upload.js"></script>
  <script src="./js/signup.js"></script>
</body>
</html>
